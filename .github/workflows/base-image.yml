name: Build Base Image

# Rebuilds ghcr.io/packetlens/vpp-ndpi-dev:base when Dockerfile.base changes.
# Step 1: Build VPP 25.10 debug .deb packages from the vpp/ submodule (~30 min)
# Step 2: Build base image with .debs + libndpi-dev installed

on:
  push:
    branches: [main]
    paths:
      - Dockerfile.base
      - scripts/build-base.sh
      - scripts/build-vpp-debs.sh
      - .github/workflows/base-image.yml
  workflow_dispatch:

jobs:
  build-base:
    name: Build & Push Base Image
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout (with VPP submodule)
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image
        run: >
          ./scripts/build-base.sh
          --skip-submodule
          --tag ghcr.io/packetlens/vpp-ndpi-dev:base
          --push
